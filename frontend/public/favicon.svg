  <line x1="11" y1="17"   x2="19" y2="17"   stroke="#0A3350" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.25"/>
  <line x1="11" y1="20.5" x2="16" y2="20.5" stroke="#0A3350" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.25"/>
</svg>
