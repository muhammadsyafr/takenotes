<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2BB5FF"/>
      <stop offset="100%" stop-color="#0878E0"/>
    </linearGradient>
  </defs>
  <!-- Background squircle -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Note page with folded top-right corner -->
